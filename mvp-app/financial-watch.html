<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  color: #e8e8e8;
}
.brand {
  text-align: center;
  margin-bottom: 24px;
}
.brand .line1 {
  font-size: 32px;

  color: #C8990A;
  font-weight: 400;
  text-transform: uppercase;
}
.brand .line2 {
  font-size: 56px;
  letter-spacing: 10px;
  color: #C8990A;
  font-weight: 700;
  text-transform: uppercase;
  margin-top: 2px;
  text-shadow: 0 0 18px rgba(200,153,10,0.55);
}
.brand .line3 {
  font-size: 11px;
  letter-spacing: 4px;
  color: #D6E8D6;
  font-weight: 300;
  text-transform: uppercase;
  margin-top: 10px;
}
.watch-container {
  position: relative;
  width: 760px;
  height: 760px;
  max-width: 95vw;
  max-height: 95vw;
}
.watch-container svg { display: block; width: 100%; height: 100%; }
.mode-toggle {
  display: inline-flex;
  background: #0d2e10;
  border: 2px solid #C8990A;
  border-radius: 32px;
  padding: 4px;
  margin-bottom: 10px;
  gap: 4px;
}
.view-toggle { margin-bottom: 16px; }
.mt-btn {
  background: transparent;
  border: none;
  color: #D6E8D6;
  font-family: 'Helvetica Neue', system-ui, sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 3px;
  padding: 9px 22px;
  border-radius: 24px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.mt-btn:hover { color: #F8F5EF; }
.mt-btn.active { background: #C8990A; color: #0d2e10; }
.footer {
  margin-top: 32px;
  font-size: 10px;
  color: #C8990A;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.refresh-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(13, 46, 16, 0.92);
  z-index: 9999;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #C8990A;
}
.refresh-overlay.active { display: flex; }
.refresh-spinner {
  width: 72px;
  height: 72px;
  border: 5px solid #C8990A;
  border-top-color: transparent;
  border-radius: 50%;
  animation: refreshspin 0.9s linear infinite;
  margin-bottom: 24px;
}
.refresh-text {
  font-size: 16px;
  letter-spacing: 4px;
  text-transform: uppercase;
}
@keyframes refreshspin { to { transform: rotate(360deg); } }
#refresh-crown:hover rect { filter: brightness(1.45); }
</style></head>

const TODAY = "MAY 24 2026";
let MODE = "dollars";

function metricD(d) { return d[VIEW][MODE]; }
function metricP()  { return PORTFOLIO[VIEW][MODE]; }
function pctVs(m)   {
  const denom = m.py_pit > 0 ? m.py_pit : m.py_total;
  return denom > 0 ? (m.cy_book - denom) / denom : 0;
}
function rankedSubdials() {
  const sorted = [...DATA].sort((a, b) => pctVs(b[VIEW][MODE]) - pctVs(a[VIEW][MODE]));
  return sorted.map((d, i) => ({name: d.name, angle: SUBDIAL_ANGLES[i]}));
}
function fmtValLong(n) {
  if (MODE === "nights") return Math.round(n).toLocaleString() + " nights";
  return "$" + Math.round(n).toLocaleString();
}
const BOTTOM = {"left": {"label": "BOOKED 30D", "dollars": {"py_total": 25450.95, "py_pit": 0, "cy_book": 34037.0}, "nights": {"py_total": 93, "py_pit": 0, "cy_book": 126}}, "right": {"label": "STAYS 7D", "dollars": {"py_total": 2848.87, "py_pit": 0, "cy_book": 2715.55}, "nights": {"py_total": 13, "py_pit": 0, "cy_book": 10}}};
let VIEW = "calendar";  // toggled between "calendar" and "rolling"

function renderSmallDial(scx, scy, r, dialData, title) {
  const v = dialData[MODE];
  const py_total = v.py_total || 0;
  const SCALE = 0.5;  // plus/minus 50% from LY hits the dial endpoints
  const pctVsLY = py_total > 0 ? (v.cy_book - py_total) / py_total : 0;
  const dev = Math.max(-1, Math.min(1, pctVsLY / SCALE));
  const needleAng = (dev * 90 + 360) % 360;  // dev=0 -> 0 (top = LY midpoint), dev=-1 -> 270 (left = -50%), dev=+1 -> 90 (right = +50%)
  const overshoot = Math.abs(pctVsLY) > SCALE;
  const above = pctVsLY >= 0;
  const thick = 7;
  const startAng = 270, endAng = 90;
  const track = arcPath(scx, scy, r, startAng, endAng);
  const [nx, ny] = polar(scx, scy, r - thick/2 - 2, needleAng);
  let out = "";
  // Face backing (midnight blue ring matching sub-dials)
  out += `<circle cx="${scx}" cy="${scy}" r="${r + thick/2 + 12}" fill="#14224a" stroke="#7a8090" stroke-width="1.5"/>`;
  out += `<circle cx="${scx}" cy="${scy}" r="${r + thick/2 + 8}" fill="#1e2e5a" stroke="#5a6072" stroke-width="0.5"/>`;
  // Track
  out += `<path d="${track}" stroke="#FFFFFF" stroke-width="${thick}" fill="none" stroke-linecap="butt"/>`;
  // Tick marks at -50%, -25%, 0 (LY = midpoint), +25%, +50%
  const tickAngs = [-90, -45, 0, 45, 90];
  for (let i = 0; i < tickAngs.length; i++) {
    const tAng = (tickAngs[i] + 360) % 360;
    const innerR = r - thick/2 - 2;
    const outerR = r + thick/2 + (i === 2 ? 7 : 3);
    const [tx1, ty1] = polar(scx, scy, innerR, tAng);
    const [tx2, ty2] = polar(scx, scy, outerR, tAng);
    const tcol = (i === 2) ? "#C8990A" : "#8a8f9c";
    const tw   = (i === 2) ? 2.2 : 1;
    out += `<line x1="${tx1}" y1="${ty1}" x2="${tx2}" y2="${ty2}" stroke="${tcol}" stroke-width="${tw}"/>`;
  }
  // Title above
  out += `<text x="${scx}" y="${scy - r - 14}" fill="#C8990A" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="1.5">${title}</text>`;
  // LY label at TOP (12 o'clock = midpoint)
  if (py_total > 0) {
    const [lyx, lyy] = polar(scx, scy, r + thick/2 + 13, 0);
    out += `<text x="${lyx}" y="${lyy}" fill="#C8990A" font-size="7" font-weight="700" text-anchor="middle" dominant-baseline="middle">LY ${fmtValShort(py_total)}</text>`;
  }
  // plus/minus 50% endpoint labels
  const [lLx, lLy] = polar(scx, scy, r + thick/2 + 9, 270);
  const [lRx, lRy] = polar(scx, scy, r + thick/2 + 9, 90);
  out += `<text x="${lLx}" y="${lLy}" fill="#8a8f9c" font-size="6" text-anchor="middle" dominant-baseline="middle">-50%</text>`;
  out += `<text x="${lRx}" y="${lRy}" fill="#8a8f9c" font-size="6" text-anchor="middle" dominant-baseline="middle">+50%</text>`;
  // Needle (green above LY, red below; gold for overshoot beyond plus/minus 50%)
  const [bLx, bLy] = polar(scx, scy, 2.5, needleAng - 90);
  const [bRx, bRy] = polar(scx, scy, 2.5, needleAng + 90);
  const needleColor = overshoot ? "#fbbf24" : (above ? "#22c55e" : "#DC2626");
  out += `<polygon points="${bLx},${bLy} ${nx},${ny} ${bRx},${bRy}" fill="${needleColor}" stroke="#1a1a1a" stroke-width="0.3"/>`;
  out += `<circle cx="${scx}" cy="${scy}" r="2.5" fill="#0a0c10" stroke="${needleColor}" stroke-width="1"/>`;
  // CY value (centered, below center) - colored by direction
  out += `<text x="${scx}" y="${scy + r * 0.65}" fill="${needleColor}" font-size="9" font-weight="700" text-anchor="middle" font-family="Consolas, monospace">${fmtValLong(v.cy_book)}</text>`;
  // % vs LY (small, below CY value)
  if (py_total > 0) {
    const sign = pctVsLY >= 0 ? "+" : "";
    const col  = pctVsLY >= 0 ? "#4ade80" : "#f87171";
    out += `<text x="${scx}" y="${scy + r * 0.95}" fill="${col}" font-size="7" font-weight="600" text-anchor="middle">${sign}${(pctVsLY * 100).toFixed(0)}% vs LY</text>`;
  }
  return out;
}

function fmtValShort(n) {
  if (MODE === "nights") return Math.round(n).toString();
  if (Math.abs(n) >= 10000) return "$" + Math.round(n / 1000) + "K";
  if (Math.abs(n) >= 1000)  return "$" + (n / 1000).toFixed(1) + "K";
  return "$" + Math.round(n);
}

// ---------- Geometry helpers ----------
function polar(cx, cy, r, angDeg) {
  // angDeg: 0 = top (12), increases clockwise (90 = right/3, 180 = bottom/6, 270 = left/9)
  const a = (angDeg - 90) * Math.PI / 180.0;
  return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
}

function arcPath(cx, cy, r, startAng, endAng) {
  const [x1, y1] = polar(cx, cy, r, startAng);
  const [x2, y2] = polar(cx, cy, r, endAng);
  const delta = ((endAng - startAng) + 360) % 360;
  const largeArc = delta > 180 ? 1 : 0;
  return `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2}`;
}

function fmt$(n) {
  return "$" + Math.round(n).toLocaleString();
}
function fmtK(n) {
  if (Math.abs(n) >= 10000) return "$" + Math.round(n/1000) + "K";
  return "$" + Math.round(n);
}

// ---------- Dial renderer ----------
// 180-degree arc from 270 (=9 o'clock, left horizon) sweeping clockwise to 90 (=3 o'clock).
// 0% at 270, 50% at 0/360 (12 o'clock top), 100% at 90.
// For a 180-deg sweep, percent p maps to angle 270 + p * 180, modulo 360.
function dialArcAngle(pct) {
  return (270 + pct * 180) % 360;
}

function renderDial(d, cx, cy, r, opts) {
  opts = opts || {};
  const thick = opts.thick || (r * 0.18);
  const nameSize = opts.nameSize || (r * 0.18);
  const valueSize = opts.valueSize || (r * 0.20);
  const isMain = opts.isMain || false;

  const v = metricD(d);
  const py_total = v.py_total || 0;
  const ROLLING_SCALE = 0.5;
  let pct_pit, pct_cy, needleAngOverride, overshoot;
  if (VIEW === "rolling") {
    const pctVsLY = py_total > 0 ? (v.cy_book - py_total) / py_total : 0;
    const dev = Math.max(-1, Math.min(1, pctVsLY / ROLLING_SCALE));
    needleAngOverride = (dev * 90 + 360) % 360;
    pct_pit = 0;
    pct_cy = (dev + 1) / 2;
    overshoot = Math.abs(pctVsLY) > ROLLING_SCALE;
  } else {
    pct_pit  = py_total > 0 ? Math.min(v.py_pit  / py_total, 1.0) : 0;
    pct_cy   = py_total > 0 ? Math.min(v.cy_book / py_total, 1.0) : 0;
    overshoot = py_total > 0 && v.cy_book > py_total;
    needleAngOverride = null;
  }

  const startAng = 270;
  const endAng = 90; // crosses through 0/360
  const pitEnd = dialArcAngle(pct_pit);

  // Track (full 180 arc)
  const track = arcPath(cx, cy, r, startAng, endAng);
  // Shaded last-year-pit fill
  const shaded = pct_pit > 0.001 ? arcPath(cx, cy, r, startAng, pitEnd) : null;

  // Tick marks: 0, 25, 50, 75, 100
  let ticks = "";
  if (VIEW === "rolling") {
    const tickAngles = [-90, -45, 0, 45, 90];
    for (let i = 0; i < tickAngles.length; i++) {
      const tAng = (tickAngles[i] + 360) % 360;
      const innerR = r - thick/2 - 3;
      const outerR = r + thick/2 + (i === 2 ? 12 : (i % 2 === 0 ? 8 : 4));
      const [tx1, ty1] = polar(cx, cy, innerR, tAng);
      const [tx2, ty2] = polar(cx, cy, outerR, tAng);
      const tw = (i === 2) ? 3 : 1.5;
      const col = (i === 2) ? "#C8990A" : "#8a8f9c";
      ticks += `<line x1="${tx1}" y1="${ty1}" x2="${tx2}" y2="${ty2}" stroke="${col}" stroke-width="${tw}"/>`;
    }
  } else {
    for (let i = 0; i <= 4; i++) {
      const tAng = dialArcAngle(i / 4);
      const innerR = r - thick/2 - 3;
      const outerR = r + thick/2 + (i % 2 === 0 ? 8 : 4);
      const [tx1, ty1] = polar(cx, cy, innerR, tAng);
      const [tx2, ty2] = polar(cx, cy, outerR, tAng);
      const tw = (i % 2 === 0) ? 2 : 1.2;
      const col = (i === 2) ? "#C8990A" : "#8a8f9c";
      ticks += `<line x1="${tx1}" y1="${ty1}" x2="${tx2}" y2="${ty2}" stroke="${col}" stroke-width="${tw}"/>`;
    }
  }
  // 50% label "12"
  if (isMain) {
    const [lx, ly] = polar(cx, cy, r + thick/2 + 22, 0);
    ticks += `<text x="${lx}" y="${ly}" fill="#d4a017" font-size="14" font-weight="600" text-anchor="middle" dominant-baseline="middle">50%</text>`;
    const [lx0, ly0] = polar(cx, cy, r + thick/2 + 22, 270);
    ticks += `<text x="${lx0}" y="${ly0}" fill="#888" font-size="11" text-anchor="middle" dominant-baseline="middle">$0</text>`;
    const [lx1, ly1] = polar(cx, cy, r + thick/2 + 22, 90);
    ticks += `<text x="${lx1}" y="${ly1}" fill="#888" font-size="11" text-anchor="middle" dominant-baseline="middle">${fmtK(py_total)}</text>`;
  }

  // Needle (use rolling override or default calendar mapping)
  const needleAng = needleAngOverride !== null ? needleAngOverride : dialArcAngle(pct_cy);
  const needleLen = r - thick/2 - 3;
  const [nx, ny] = polar(cx, cy, needleLen, needleAng);
  const needleColor = overshoot ? "#fbbf24" : "#DC2626";
  // Perimeter triangle marker for main dial (instead of radial needle)
  let perimeterMarker = "";
  if (isMain && pct_cy > 0) {
    const [mx, my] = polar(cx, cy, r - thick/2 - 2, needleAng);
    const [tipx, tipy] = polar(cx, cy, r - thick/2 - 18, needleAng);
    const [lx, ly] = polar(cx, cy, r - thick/2 - 14, needleAng - 4);
    const [rx, ry] = polar(cx, cy, r - thick/2 - 14, needleAng + 4);
    perimeterMarker = `<polygon points="${mx},${my} ${lx},${ly} ${rx},${ry}" fill="${needleColor}" stroke="${d.color}" stroke-width="1"/>`;
  }

  // Sub-dial face circle
  const faceFill = isMain
    ? `<defs><radialGradient id="mainFace" cx="50%" cy="35%"><stop offset="0%" stop-color="#F8F5EF"/><stop offset="100%" stop-color="#070809"/></radialGradient></defs>`
    : "";

  // Property name label (above center)
  const nameY = cy - r * 0.30;
  // Value label (below center)
  const valueY = cy + r * 0.55;
  const compareY = cy + r * 0.75;

  // Compare text (% vs LY pace) + LY full year value
  let cmp = "";
  if (v.py_pit > 0 && !isMain) {
    const diff = v.cy_book - v.py_pit;
    const pct = diff / v.py_pit * 100;
    const sign = diff >= 0 ? "+" : "";
    const cls_color = diff >= 0 ? "#4ade80" : "#f87171";
    const txt = `${sign}${pct.toFixed(0)}% vs LY`;
    cmp = `<text x="${cx}" y="${compareY}" fill="${cls_color}" font-size="9" font-weight="600" text-anchor="middle" dominant-baseline="middle">${txt}</text>`;
  }
  // LY full-year value placement
  let lyLabel = "";
  if (!isMain && v.py_total > 0) {
    if (VIEW === "rolling") {
      const [lex, ley] = polar(cx, cy, r + thick/2 + 14, 0);
      lyLabel = `<text x="${lex}" y="${ley}" fill="#C8990A" font-size="9" font-weight="700" text-anchor="middle" dominant-baseline="middle">${fmtValShort(v.py_total)}</text>`;
    } else {
      const [lex, ley] = polar(cx, cy, r - thick/2 - 4, 90);
      lyLabel = `<text x="${lex - 2}" y="${ley + 10}" fill="#a8b0c2" font-size="9" font-weight="700" text-anchor="end">${fmtValShort(v.py_total)}</text>`;
    }
  }

  return `
    ${faceFill}
    <circle cx="${cx}" cy="${cy}" r="${r + thick/2 + 16}" fill="${isMain ? '#F8F5EF' : '#14224a'}" stroke="${isMain ? '#1F6224' : '#7a8090'}" stroke-width="${isMain ? 3 : 2}"/>
    <circle cx="${cx}" cy="${cy}" r="${r + thick/2 + 12}" fill="${isMain ? 'url(#mainFace)' : '#1e2e5a'}" stroke="${isMain ? '#5a6072' : '#5a6072'}" stroke-width="${isMain ? 1 : 0.5}"/>
    <path d="${track}" stroke="${isMain ? '#c4baa4' : '#FFFFFF'}" stroke-width="${thick}" fill="none" stroke-linecap="butt"/>
    ${(!isMain && VIEW === 'rolling') ? `<path d="${arcPath(cx, cy, r, 270, 0)}" stroke="${d.color}" stroke-width="${thick}" fill="none" stroke-linecap="butt" opacity="0.95"/>` : ""}
    ${shaded ? `<path d="${shaded}" stroke="${d.color}" stroke-width="${thick}" fill="none" stroke-linecap="butt" opacity="0.95"/>` : ""}
    ${ticks}
    ${isMain ? "" : `<text x="${cx}" y="${nameY}" fill="#F8F5EF" font-size="${nameSize}" font-weight="500" font-family="Helvetica Neue, Segoe UI, system-ui, sans-serif" text-anchor="middle" dominant-baseline="middle" letter-spacing="1">${d.name.toUpperCase()}</text>`}
    ${isMain ? "" : (() => {
      const baseW = 3.2;
      const [bLx, bLy] = polar(cx, cy, baseW, needleAng - 90);
      const [bRx, bRy] = polar(cx, cy, baseW, needleAng + 90);
      return `<polygon points="${bLx},${bLy} ${nx},${ny} ${bRx},${bRy}" fill="${needleColor}" stroke="#8B0000" stroke-width="0.4"/>`;
    })()}
    ${perimeterMarker}
    ${isMain ? "" : `<circle cx="${cx}" cy="${cy}" r="${r * 0.10}" fill="#0a0c10" stroke="${d.color}" stroke-width="1.5"/><circle cx="${cx}" cy="${cy}" r="${r * 0.04}" fill="${d.color}"/>`}
    ${opts.suppressValue ? "" : `<text x="${cx}" y="${valueY}" fill="${isMain ? (overshoot ? '#fbbf24' : '#F8F5EF') : (overshoot ? '#fbbf24' : '#DC2626')}" font-size="${valueSize}" font-weight="700" text-anchor="middle" dominant-baseline="middle" font-family="Consolas, monospace">${fmtValLong(v.cy_book)}</text>`}
    ${cmp}
    ${lyLabel}
  `;
}

  by += 28;
  svg += `<rect x="${cx - 50}" y="${by - 15}" width="100" height="28" fill="#F8F5EF" stroke="#1F6224" stroke-width="1.5" rx="2"/>`;
  svg += `<text x="${cx}" y="${by}" fill="#0d2e10" font-size="13" font-weight="700" text-anchor="middle" dominant-baseline="middle" font-family="Consolas, monospace">${TODAY}</text>`;

  // === MAIN RED NEEDLE: from center of MVP logo out to perimeter at CY position ===
  if (mp.py_total > 0) {
    const cyPct = Math.min(mp.cy_book / mp.py_total, 1.0);
    const overshoot = mainOvershoot;
    const nAng = (mainNeedleAngOverride !== null) ? mainNeedleAngOverride : (270 + cyPct * 180) % 360;
    const tipR = mainR - mainThick/2 - 4;
    const [tipX, tipY] = polar(cx, cy, tipR, nAng);
    // Tapered tail: width 6 at the center pivot, tapering to 1 at the tip
    const [lx, ly] = polar(cx, cy, 8, nAng - 90);
    const [rx, ry] = polar(cx, cy, 8, nAng + 90);
    const needleFill = overshoot ? "#fbbf24" : "#DC2626";
    // Drop shadow for depth
    svg += `<polygon points="${lx + 2},${ly + 2} ${tipX + 2},${tipY + 2} ${rx + 2},${ry + 2}" fill="#000000" opacity="0.35"/>`;
    // Main needle
    svg += `<polygon points="${lx},${ly} ${tipX},${tipY} ${rx},${ry}" fill="${needleFill}" stroke="#8B0000" stroke-width="0.6"/>`;
    // Center pivot dot (sits over the logo center)
    svg += `<circle cx="${cx}" cy="${cy}" r="5" fill="#1a1d24" stroke="${needleFill}" stroke-width="2"/>`;
    svg += `<circle cx="${cx}" cy="${cy}" r="2" fill="${needleFill}"/>`;
  }
  svg += '</svg>';
  document.getElementById('watch').innerHTML = svg;
  const crown = document.getElementById('refresh-crown');
  if (crown) {
    crown.addEventListener('click', async () => {
      const overlay = document.getElementById('refresh-overlay');
      if (overlay) overlay.classList.add('active');
      try {
        const r = await fetch('http://127.0.0.1:8765/refresh-watch', {method: 'POST'});
        const j = await r.json();
        if (j.ok) {
          location.reload();
        } else {
          if (overlay) overlay.classList.remove('active');
          alert('Refresh failed: ' + (j.error || 'unknown'));
        }
      } catch (e) {
        if (overlay) overlay.classList.remove('active');
        alert('Webhook unreachable at 127.0.0.1:8765 - ' + e.message);
      }
    });
  }
}
render();

  MODE = "dollars";
  document.getElementById("btn-dollars").classList.add("active");
  document.getElementById("btn-nights").classList.remove("active");
